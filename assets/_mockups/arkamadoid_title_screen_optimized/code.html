<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ARKAMADOID - Title Screen</title>

                        "on-secondary": "#00363a",
                        "tertiary-container": "#bdad00",
                        "on-primary-fixed-variant": "#840076",
                        "surface-container-lowest": "#0e0e14",

                        "primary": "#ff00e5",

                        "on-primary-container": "#520049",
                        "tertiary-fixed-dim": "#dbc900",
                        "on-surface-variant": "#ddbed1",

                        "inverse-primary": "#ad009b",
                        "outline": "#a5889b",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#4f4800",
                        "on-primary-fixed": "#3a0033",
                        "error-container": "#93000a",
                        "primary-fixed": "#ffd7f0",
                        "on-tertiary": "#363100",
                        "secondary-fixed-dim": "#00eefc",
                        "on-primary": "#5e0053",
                        "surface-container": "#1f1f26",
                        "inverse-surface": "#e4e1ea",
                        "on-background": "#e4e1ea",
                        "surface-bright": "#393840",

                    "borderRadius": {

                    "spacing": {
                        "margin-mobile": "16px",

                    "fontFamily": {
                        "body-md": ["Space Mono"],

                    "fontSize": {

                        "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "700"}],

                },
            },
        }

<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            15% { opacity: 0.94; }
            20% { opacity: 1; }
            100% { opacity: 1; }
        }
        @keyframes blink-extreme {
            0%, 49% { opacity: 1; text-shadow: 0 0 20px #ff00e5, 0 0 40px #ff00e5; }
            50%, 100% { opacity: 0.4; text-shadow: none; }
        }
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.03), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 10;
        }
        .grid-bg {
            background-image: linear-gradient(to right, rgba(255, 0, 229, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 0, 229, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .scanline-anim {
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            position: absolute;
            top: -100%;
            animation: scanline 4s linear infinite;
        }
        .flicker-effect {
            animation: flicker 0.15s infinite;
        }
        .arcade-bezel {
            border: 40px solid #1b1b22;
            border-image: linear-gradient(to bottom right, #2a2930, #0e0e14, #1b1b22) 1;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }
        .neon-glow-magenta {
            box-shadow: 0 0 25px rgba(255, 0, 229, 0.7), inset 0 0 10px rgba(255, 0, 229, 0.5);
        }
        .neon-glow-cyan-btn {
            box-shadow: 0 0 30px rgba(0, 238, 252, 0.6), inset 0 0 15px rgba(0, 238, 252, 0.4);
            border: 4px solid #00eefc;
        }
        .neon-glow-cyan-btn:active {
            box-shadow: 0 0 50px rgba(0, 238, 252, 1), inset 0 0 20px rgba(0, 238, 252, 0.8);
            transform: scale(0.98);
        }
        .logo-bloom {
            filter: drop-shadow(0 0 40px rgba(255, 0, 229, 0.8)) drop-shadow(0 0 10px rgba(0, 238, 252, 0.5));
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface overflow-hidden h-screen flex items-center justify-center font-body-md">
<!-- Immersive Arcade Cabinet -->
<main class="relative z-20 w-full h-full max-w-[1200px] max-h-[900px] arcade-bezel flex flex-col overflow-hidden bg-background md:rounded-xl">
<!-- Top HUD Overlay (Matching Screen 6) -->
<header class="flex justify-between items-start px-8 pt-8 w-full absolute top-0 left-0 z-50 pointer-events-none">
<div class="flex flex-col border-l-4 border-secondary p-3 bg-surface-container-lowest/40 backdrop-blur-sm">
<span class="text-[10px] font-bold text-secondary uppercase tracking-[0.2em] mb-1 drop-shadow-[0_0_8px_#00eefc]">1P SCORE</span>
<span class="text-3xl font-display-lg text-secondary drop-shadow-[0_0_15px_#00eefc] tabular-nums">000000</span>
</div>
<div class="flex flex-col items-end border-r-4 border-primary p-3 bg-surface-container-lowest/40 backdrop-blur-sm">
<span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] mb-1 drop-shadow-[0_0_8px_#ff00e5]">HI-SCORE</span>
<span class="text-3xl font-display-lg text-primary drop-shadow-[0_0_15px_#ff00e5] tabular-nums">005000</span>
</div>
</header>
<!-- CRT Screen Content Area -->
<div class="flex-1 relative overflow-hidden flex flex-col items-center justify-center pt-20 pb-20 flicker-effect">
<!-- Visual Layers -->
<div class="absolute inset-0 grid-bg opacity-40"></div>
<div class="crt-overlay"></div>
<div class="scanline-anim"></div>
<!-- Hero Section -->
<div class="flex flex-col items-center justify-center gap-12 relative z-20">
<!-- Central Logo with Extreme Bloom -->
<div class="relative group">
<img alt="Arkamadoid Logo" class="w-72 h-72 md:w-[500px] md:h-[500px] object-contain logo-bloom animate-pulse" src="https://lh3.googleusercontent.com/aida/ADBb0ugFJYtPmnUqxcxL08Xr1QOnuoVh4KtFzyh43qvqaBJrRcZERj3i3f91xX7K48eWhIH5gSRquh-V37SHblqQL29isRWSdDER3FN67XXtux6E6FulP_ph-8t33FFwZga3OyNieZtJ1Kc9K4nZ9gChjFCh35Kk9yyK2zSlNY1aNCeaB1L7rHDvaf5W_i4QrdPruhuQCSs_sD9rgfC8vknYkrEPV8WbJRz9ggRZNR7ZYUfuXKb7cBbLFQbOYKao"/>
<div class="absolute inset-0 bg-primary/10 blur-[100px] rounded-full -z-10 animate-pulse scale-150"></div>
</div>
<!-- Interaction Area -->
<div class="flex flex-col items-center gap-10">
<span class="font-headline-lg text-headline-lg text-primary uppercase tracking-[0.4em] animate-[blink-extreme_1.5s_infinite] drop-shadow-[0_0_20px_#ff00e5]">
                    Insert Coin
                </span>
<!-- Redesigned Arcade Button -->
<button class="px-16 py-6 bg-surface-container-lowest text-secondary font-headline-lg text-headline-lg uppercase tracking-widest neon-glow-cyan-btn transition-all flex items-center gap-6 group">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    Start Game
                </button>
</div>
</div>
<!-- High Score Roll -->
<div class="absolute bottom-16 w-full max-w-2xl px-8 flex justify-center gap-8">
<div class="px-6 py-3 border border-secondary/30 bg-secondary/5 backdrop-blur-sm flex gap-4 items-center">
<span class="text-secondary font-bold tracking-widest">1ST</span>
<span class="text-on-surface font-headline-lg-mobile">ARC</span>
<span class="text-secondary font-bold tabular-nums">5000</span>
</div>
<div class="px-6 py-3 border border-primary/30 bg-primary/5 backdrop-blur-sm flex gap-4 items-center">
<span class="text-primary font-bold tracking-widest">2ND</span>
<span class="text-on-surface font-headline-lg-mobile">ZAX</span>
<span class="text-primary font-bold tabular-nums">4200</span>
</div>
</div>
</div>
<!-- Bottom Navigation Chrome (Matching Game UI Style) -->
<nav class="relative w-full z-50 flex justify-around items-center px-gutter pb-4 bg-surface-container-low/90 h-24 border-t-4 border-secondary/20 backdrop-blur-xl">
<a class="flex flex-col items-center justify-center text-secondary drop-shadow-[0_0_15px_#00eefc] scale-110" href="#">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[10px] font-label-sm uppercase mt-1 font-bold">Cabinet</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/40 hover:text-primary transition-all group" href="#">
<span class="material-symbols-outlined text-3xl group-hover:drop-shadow-[0_0_10px_#ff00e5]">play_circle</span>
<span class="text-[10px] font-label-sm uppercase mt-1">Arcade</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/40 hover:text-primary transition-all group" href="#">
<span class="material-symbols-outlined text-3xl group-hover:drop-shadow-[0_0_10px_#ff00e5]">leaderboard</span>
<span class="text-[10px] font-label-sm uppercase mt-1">Ranking</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/40 hover:text-primary transition-all group" href="#" id="system-btn">
<span class="material-symbols-outlined text-3xl group-hover:drop-shadow-[0_0_10px_#ff00e5]">settings</span>
<span class="text-[10px] font-label-sm uppercase mt-1">System</span>
</a>
</nav>
</main>
<!-- Side System Drawer -->
<aside class="fixed left-0 top-0 h-full z-[100] p-margin-desktop bg-background shadow-[20px_0_60px_rgba(0,0,0,0.9)] w-80 border-r-4 border-secondary/30 -translate-x-full transition-transform duration-300" id="system-menu">
<div class="flex flex-col h-full">
<div class="mb-12 border-b border-secondary/20 pb-4">
<span class="font-headline-lg text-headline-lg text-secondary drop-shadow-[0_0_15px_#00eefc]">CORE SYSTEM</span>
</div>
<nav class="flex flex-col gap-4">
<button class="flex items-center gap-4 p-5 rounded-sm bg-primary/10 text-primary font-bold border-l-4 border-primary neon-glow-magenta">
<span class="material-symbols-outlined">monetization_on</span>
                INSERT CREDIT
            </button>
<button class="flex items-center gap-4 p-5 text-on-surface-variant hover:bg-secondary/10 hover:text-secondary transition-all">
<span class="material-symbols-outlined">settings_input_component</span>
                INPUT CONFIG
            </button>
<button class="flex items-center gap-4 p-5 text-on-surface-variant hover:bg-secondary/10 hover:text-secondary transition-all">
<span class="material-symbols-outlined">videocam</span>
                CRT FILTERS
            </button>
<button class="flex items-center gap-4 p-5 text-on-surface-variant hover:bg-error/10 hover:text-error transition-all mt-auto">
<span class="material-symbols-outlined">power_settings_new</span>
                SHUTDOWN
            </button>
</nav>
</div>
</aside>
<script>
    const systemMenu = document.getElementById('system-menu');
    const systemButton = document.getElementById('system-btn');

    systemButton.addEventListener('click', (e) => {
        e.preventDefault();
        systemMenu.classList.toggle('-translate-x-full');
    });

    document.addEventListener('click', (e) => {
        if (!systemMenu.contains(e.target) && !systemButton.contains(e.target)) {
            systemMenu.classList.add('-translate-x-full');
        }
    });

    const startButton = document.querySelector('button');
    startButton.addEventListener('click', () => {
        startButton.classList.add('brightness-150');
        setTimeout(() => {
            startButton.classList.remove('brightness-150');
            console.log('ARKAMADOID - Level 01 Initializing...');
        }, 300);
    });
</script>
</body></html>
