<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arkamadoid - Game Mode Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#0e0e14",
                    "surface-variant": "#35343b",
                    "surface-dim": "#131319",
                    "error": "#ffb4ab",
                    "secondary-fixed-dim": "#00dbe9",
                    "on-primary-fixed-variant": "#840076",
                    "on-secondary-fixed-variant": "#004f54",
                    "inverse-primary": "#ad009b",
                    "on-primary-container": "#520049",
                    "inverse-on-surface": "#303037",
                    "on-surface-variant": "#ddbed1",
                    "secondary-container": "#00eefc",
                    "tertiary-fixed": "#fae500",
                    "primary-fixed-dim": "#fface8",
                    "surface-container-highest": "#35343b",
                    "on-error": "#690005",
                    "surface-bright": "#393840",
                    "on-tertiary-container": "#474000",
                    "tertiary-container": "#bdad00",
                    "tertiary-fixed-dim": "#dbc900",
                    "on-tertiary-fixed-variant": "#4f4800",
                    "surface-container-low": "#1b1b22",
                    "on-tertiary": "#363100",
                    "background": "#131319",
                    "surface-container": "#1f1f26",
                    "primary": "#fface8",
                    "on-secondary": "#00363a",
                    "on-secondary-fixed": "#002022",
                    "tertiary": "#dbc900",
                    "surface": "#131319",
                    "on-primary": "#5e0053",
                    "on-error-container": "#ffdad6",
                    "surface-container-high": "#2a2930",
                    "outline-variant": "#574050",
                    "on-secondary-container": "#00686f",
                    "primary-fixed": "#ffd7f0",
                    "on-background": "#e4e1ea",
                    "on-primary-fixed": "#3a0033",
                    "secondary-fixed": "#7df4ff",
                    "on-tertiary-fixed": "#1f1c00",
                    "surface-tint": "#fface8",
                    "on-surface": "#e4e1ea",
                    "error-container": "#93000a",
                    "inverse-surface": "#e4e1ea",
                    "secondary": "#d3fbff",
                    "primary-container": "#ff24e4",
                    "outline": "#a5889b"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "gutter": "16px",
                    "unit": "8px",
                    "margin-desktop": "32px",
                    "bezel-width": "40px"
            },
            "fontFamily": {
                    "display-lg": ["Space Mono"],
                    "body-md": ["Space Mono"],
                    "headline-lg-mobile": ["Space Mono"],
                    "headline-lg": ["Space Mono"],
                    "label-sm": ["Space Mono"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-2px", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 100;
            pointer-events: none;
            animation: flicker 0.1s infinite;
        }
        .crt-scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.02);
            z-index: 101;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }
        .neon-border-magenta {
            border: 2px solid #ff24e4;
            box-shadow: 0 0 15px rgba(255, 36, 228, 0.6), inset 0 0 10px rgba(255, 36, 228, 0.3);
        }
        .neon-border-cyan {
            border: 2px solid #00eefc;
            box-shadow: 0 0 15px rgba(0, 238, 252, 0.6), inset 0 0 10px rgba(0, 238, 252, 0.3);
        }
        .neon-border-yellow {
            border: 2px solid #fae500;
            box-shadow: 0 0 15px rgba(250, 229, 0, 0.6), inset 0 0 10px rgba(250, 229, 0, 0.3);
        }
        .neon-border-subtle {
            border: 2px solid #35343b;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
        }
        .text-glow-magenta {
            text-shadow: 0 0 8px #ff24e4, 0 0 15px #ff24e4;
        }
        .text-glow-cyan {
            text-shadow: 0 0 8px #00eefc, 0 0 15px #00eefc;
        }
        .text-glow-yellow {
            text-shadow: 0 0 8px #fae500, 0 0 15px #fae500;
        }
        .text-glow-white {
            text-shadow: 0 0 8px #fff, 0 0 15px #fff;
        }
    </style>
</head>
<body class="bg-[#131319] text-on-background font-body-md selection:bg-primary selection:text-on-primary overflow-x-hidden min-h-screen">
<div class="crt-overlay"></div>
<div class="crt-scanline"></div>
<div class="flex flex-col min-h-screen relative">
<!-- TopAppBar -->
<header class="bg-surface-dim border-b border-outline-variant w-full sticky top-0 z-40 h-16 flex justify-between items-center px-margin-mobile">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="sports_esports">sports_esports</span>
<h1 class="font-display-lg text-xl text-primary drop-shadow-[0_0_8px_rgba(255,172,232,0.8)] tracking-tighter uppercase">ARKAMADOID</h1>
</div>
<div class="flex items-center">
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" data-icon="settings">settings</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center px-margin-mobile py-6 overflow-y-auto pb-32">
<!-- Screen Title -->
<div class="text-center mb-8">
<h2 class="font-display-lg text-2xl text-on-surface tracking-[0.2em] uppercase mb-1">SELECT MODE</h2>
<div class="h-0.5 w-48 bg-primary mx-auto drop-shadow-[0_0_8px_rgba(255,36,228,1)]"></div>
</div>
<!-- Mode List (Vertical Stack) -->
<div class="w-full max-w-md space-y-4">
<!-- ARCADE MODE -->
<button class="w-full flex items-center bg-surface-container-high rounded-xl p-4 neon-border-magenta transition-transform active:scale-95 group">
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-primary/10 rounded-lg mr-4 border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="joystick" style="font-variation-settings: 'FILL' 1;">joystick</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline-lg-mobile text-primary text-glow-magenta leading-none mb-1">ARCADE</h3>
<p class="text-on-surface-variant text-xs opacity-80 leading-snug">Classic levels with evolving boss patterns.</p>
</div>
<span class="material-symbols-outlined text-primary ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- ENDLESS MODE -->
<button class="w-full flex items-center bg-surface-container-high rounded-xl p-4 neon-border-cyan transition-transform active:scale-95 group">
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-secondary-container/10 rounded-lg mr-4 border border-secondary-container/30">
<span class="material-symbols-outlined text-secondary-container text-4xl" data-icon="all_inclusive" style="font-variation-settings: 'FILL' 1;">all_inclusive</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline-lg-mobile text-secondary-container text-glow-cyan leading-none mb-1">ENDLESS</h3>
<p class="text-on-surface-variant text-xs opacity-80 leading-snug">Infinite bricks. Speed increases over time.</p>
</div>
<span class="material-symbols-outlined text-secondary-container ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- DAILY MODE -->
<button class="w-full flex items-center bg-surface-container-high rounded-xl p-4 neon-border-yellow transition-transform active:scale-95 group">
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-tertiary/10 rounded-lg mr-4 border border-tertiary/30">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="calendar_today" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline-lg-mobile text-tertiary text-glow-yellow leading-none mb-1">DAILY</h3>
<p class="text-on-surface-variant text-xs opacity-80 leading-snug">Global challenge reset every 24 hours.</p>
</div>
<span class="material-symbols-outlined text-tertiary ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- PRACTICE MODE -->
<button class="w-full flex items-center bg-surface-container-high rounded-xl p-4 neon-border-subtle transition-transform active:scale-95 group opacity-90 hover:opacity-100">
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-variant/20 rounded-lg mr-4 border border-surface-variant">
<span class="material-symbols-outlined text-surface-variant text-4xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline-lg-mobile text-on-surface leading-none mb-1">PRACTICE</h3>
<p class="text-on-surface-variant text-xs opacity-80 leading-snug">Zero gravity mode. Refine your aim skills.</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- HUD Stats -->
<div class="w-full max-w-md mt-10 grid grid-cols-2 gap-4">
<div class="neon-border-magenta bg-primary/5 p-3 rounded-lg flex flex-col items-center">
<span class="text-[10px] text-primary font-bold tracking-widest uppercase mb-1">PLAYER 1</span>
<span class="font-display-lg text-lg text-primary text-glow-magenta">004590</span>
</div>
<div class="neon-border-cyan bg-secondary-container/5 p-3 rounded-lg flex flex-col items-center">
<span class="text-[10px] text-secondary-container font-bold tracking-widest uppercase mb-1">HI-SCORE</span>
<span class="font-display-lg text-lg text-secondary-container text-glow-cyan">999999</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-surface-dim border-t border-surface-variant flex justify-around items-center px-gutter shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-[10px]">HOME</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary-container relative" href="#">
<div class="absolute -top-1 w-12 h-12 bg-secondary-container/20 blur-md rounded-full"></div>
<span class="material-symbols-outlined text-3xl drop-shadow-[0_0_8px_#00eefc]" data-icon="videogame_asset" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-label-sm text-[10px] text-glow-cyan">PLAY</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-sm text-[10px]">RANK</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-sm text-[10px]">SET</span>
</a>
</nav>
</div>
<!-- Screen Glow Decorations -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-10">
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-primary to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-secondary-container to-transparent"></div>
</div>
</body></html>
