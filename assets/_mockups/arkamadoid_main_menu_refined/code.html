<style>
        body {
            background-color: #0e0e14;
            color: #e4e1ea;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        .crt-overlay::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.27; }
            50% { opacity: 0.31; }
            100% { opacity: 0.29; }
        }

        .arcade-grid {
            background-image: 
                linear-gradient(to right, rgba(255, 172, 232, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 172, 232, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 1000px;
            transform-style: preserve-3d;
            transform: rotateX(60deg) translateY(-200px);
            position: absolute;
            top: 0;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: -1;
            opacity: 0.5;
        }

        .bezel-frame {
            border: 40px solid #1f1f26;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        .logo-glow {
            text-shadow: 0 0 10px #fface8, 0 0 20px #ff24e4, 0 0 30px #ff24e4;
            letter-spacing: -4px;
        }

        .menu-button {
            position: relative;
            background: #1b1b22;
            border: 2px solid transparent;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .menu-button:hover {
            background: #2a2930;
            border-color: #00dbe9;
            box-shadow: 0 0 15px rgba(0, 219, 233, 0.4), inset 0 0 10px rgba(255, 36, 228, 0.2);
            transform: scale(1.05);
        }

        .active-selection {
            border-color: #00eefc !important;
            box-shadow: 0 0 25px #00eefc, inset 0 0 15px #ff24e4 !important;
            animation: pulse-active 1.5s infinite;
        }

        @keyframes pulse-active {
            0%, 100% { transform: scale(1.05); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }

        .scanline-anim {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        .vignette {
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
    </style>
<style>
    body {

<script>
        document.querySelectorAll('.menu-button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                document.querySelectorAll('.menu-button').forEach(b => b.classList.remove('active-selection'));
                btn.classList.add('active-selection');
            });
        });

        const grid = document.querySelector('.arcade-grid');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            grid.style.transform = `rotateX(${60 + y}deg) rotateY(${x}deg) translateY(-200px)`;
        });
    </script>
