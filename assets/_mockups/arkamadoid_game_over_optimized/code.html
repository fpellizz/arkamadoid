<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arkamadoid - GAME OVER</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes flicker {
            0% { opacity: 0.95; }
            5% { opacity: 0.90; }
            10% { opacity: 0.99; }
            15% { opacity: 0.92; }
            20% { opacity: 1; }
            100% { opacity: 1; }
        }
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -3px 0 #ff00e5, 3px 0 #00eefc, 0 0 30px #ff00e5; }
            20% { transform: translate(-2px, 2px); text-shadow: -4px 0 #ff00e5, 4px 0 #00eefc, 0 0 50px #ff00e5; }
            40% { transform: translate(-2px, -2px); text-shadow: 4px 0 #ff00e5, -4px 0 #00eefc, 0 0 40px #00eefc; }
            60% { transform: translate(2px, 2px); text-shadow: -4px 0 #ff00e5, 4px 0 #00eefc, 0 0 60px #ff00e5; }
            80% { transform: translate(2px, -2px); text-shadow: 4px 0 #ff00e5, -4px 0 #00eefc, 0 0 50px #00eefc; }
            100% { transform: translate(0); text-shadow: -3px 0 #ff00e5, 3px 0 #00eefc, 0 0 30px #ff00e5; }
        }
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.08), rgba(0, 255, 0, 0.05), rgba(0, 0, 255, 0.08));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 40;
            mix-blend-mode: screen;
            opacity: 0.7;
        }
        .scanline-anim {
            width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0) 100%);
            position: absolute;
            top: -100%;
            animation: scanline 4s linear infinite;
            z-index: 41;
            pointer-events: none;
        }
        .flicker-effect {
            animation: flicker 0.15s infinite;
        }
        .glitch-text {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) infinite both;
        }
        .neon-glow-magenta {
            text-shadow: 0 0 20px #ff00e5, 0 0 40px #ff00e5, 0 0 60px #ff00e5;
        }
        .neon-glow-cyan {
            text-shadow: 0 0 20px #00eefc, 0 0 40px #00eefc, 0 0 60px #00eefc;
        }
        .extreme-bloom-magenta {
            filter: drop-shadow(0 0 30px #ff00e5) drop-shadow(0 0 60px #ff00e5);
        }
        .neon-border-cyan {
            box-shadow: 0 0 25px rgba(0, 238, 252, 0.6), inset 0 0 15px rgba(0, 238, 252, 0.4);
            border: 3px solid #00eefc;
        }
        .neon-border-magenta {
            box-shadow: 0 0 25px rgba(255, 0, 229, 0.6), inset 0 0 15px rgba(255, 0, 229, 0.4);
            border: 3px solid #ff00e5;
        }
        .grid-bg {
            background-image: linear-gradient(to right, rgba(255, 0, 229, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 0, 229, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .arcade-button:active {
            transform: scale(0.95);
            filter: brightness(1.5);
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#000000",
                    "surface": "#000000",
                    "primary": "#ff00e5",
                    "secondary": "#00eefc",
                    "primary-container": "#ff00e5",
                    "secondary-container": "#00eefc",
                    "surface-container-lowest": "#000000",
                    "on-surface": "#ffffff",
                    "outline": "#ff00e5",
                    "outline-variant": "#00eefc"
            },
            "fontFamily": {
                    "body-md": ["Space Mono"],
                    "display-lg": ["Space Mono"],
                    "headline-lg": ["Space Mono"],
                    "label-sm": ["Space Mono"]
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "gutter": "16px",
                    "bezel-width": "40px"
            }
          },
        },
      }
    </script>
</head>
<body class="bg-black text-white font-body-md selection:bg-primary selection:text-white overflow-hidden h-screen">
<!-- Main Arcade Container -->
<div class="fixed inset-0 flex flex-col bg-black">
<!-- CRT Visual Layers -->
<div class="crt-overlay"></div>
<div class="scanline-anim"></div>
<div class="absolute inset-0 grid-bg opacity-30 pointer-events-none"></div>
<!-- Top App Bar -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full z-50 border-b border-primary/30 bg-black/40 backdrop-blur-md">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary neon-glow-magenta text-2xl" data-icon="videogame_asset">videogame_asset</span>
<h1 class="font-display-lg text-lg text-primary neon-glow-magenta tracking-tighter uppercase">Arkamadoid</h1>
</div>
<div class="flex flex-col items-end">
<span class="text-[9px] font-bold text-secondary uppercase tracking-[0.2em] opacity-80">HI-SCORE</span>
<span class="font-display-lg text-xl text-secondary neon-glow-cyan tabular-nums">084,200</span>
</div>
</header>
<!-- Content Area -->
<main class="relative flex-grow flex flex-col items-center justify-center p-gutter flicker-effect overflow-hidden">
<!-- Background Simulated Gameplay (Very Dim) -->
<div class="absolute inset-0 opacity-10 blur-xl pointer-events-none">
<div class="grid grid-cols-6 gap-2 p-10">
<div class="h-4 bg-primary rounded"></div><div class="h-4 bg-primary rounded"></div><div class="h-4 bg-primary rounded"></div>
<div class="h-4 bg-secondary rounded"></div><div class="h-4 bg-secondary rounded"></div><div class="h-4 bg-secondary rounded"></div>
</div>
</div>
<!-- GAME OVER Text -->
<div class="relative z-30 mb-12 text-center">
<h2 class="font-display-lg text-[64px] md:text-[120px] text-primary font-black uppercase leading-none glitch-text extreme-bloom-magenta" style="letter-spacing: -0.05em;">
                GAME<br/>OVER
            </h2>
</div>
<!-- Continue Section -->
<div class="relative z-30 flex flex-col items-center gap-10 w-full max-w-sm">
<h3 class="font-headline-lg text-secondary neon-glow-cyan uppercase tracking-[0.3em] text-2xl">
                CONTINUE? <span class="text-white brightness-150 animate-pulse" id="countdown">9</span>
</h3>
<!-- Interaction Buttons -->
<div class="flex gap-12">
<div class="flex flex-col items-center gap-4">
<button class="arcade-button neon-border-cyan bg-secondary/10 w-24 h-24 flex items-center justify-center group transition-all duration-75" id="btn-yes">
<span class="material-symbols-outlined text-4xl text-secondary neon-glow-cyan" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<span class="font-label-sm text-secondary uppercase tracking-widest font-bold text-sm">YES</span>
</div>
<div class="flex flex-col items-center gap-4">
<button class="arcade-button neon-border-magenta bg-primary/10 w-24 h-24 flex items-center justify-center group transition-all duration-75" id="btn-no">
<span class="material-symbols-outlined text-4xl text-primary neon-glow-magenta" style="font-variation-settings: 'FILL' 1;">close</span>
</button>
<span class="font-label-sm text-primary uppercase tracking-widest font-bold text-sm">NO</span>
</div>
</div>
</div>
<!-- Score Banner -->
<div class="mt-16 w-full max-w-xs p-6 bg-black border-2 border-secondary/40 neon-border-cyan relative overflow-hidden">
<div class="absolute inset-0 bg-secondary/5 pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="text-[10px] font-bold text-secondary uppercase tracking-[0.4em] mb-2 opacity-70">FINAL SCORE</span>
<span class="font-display-lg text-4xl text-secondary neon-glow-cyan tabular-nums">042,150</span>
</div>
</div>
</main>
<!-- Footer Cabinet Bar -->
<footer class="h-24 bg-black border-t border-primary/30 flex flex-col items-center justify-center relative px-margin-desktop overflow-hidden">
<div class="flex flex-col items-center gap-2 z-10">
<span class="font-label-sm text-primary neon-glow-magenta uppercase tracking-[0.4em] font-bold text-[11px] animate-pulse">INSERT COIN(S) TO CONTINUE</span>
<div class="flex gap-4">
<div class="w-3 h-3 rounded-full bg-secondary neon-glow-cyan"></div>
<div class="w-3 h-3 rounded-full bg-secondary/20"></div>
<div class="w-3 h-3 rounded-full bg-secondary/20"></div>
</div>
</div>
<!-- Quick Nav Icons -->
<div class="absolute right-8 bottom-6 flex gap-6 opacity-60">
<span class="material-symbols-outlined text-secondary text-2xl cursor-pointer hover:opacity-100" data-icon="settings">settings</span>
<span class="material-symbols-outlined text-secondary text-2xl cursor-pointer hover:opacity-100" data-icon="leaderboard">leaderboard</span>
</div>
</footer>
</div>
<!-- Game Over Logic Script -->
<script>
    // Countdown Logic
    let timeLeft = 9;
    const countdownDisplay = document.getElementById('countdown');
    const timer = setInterval(() => {
        timeLeft--;
        if (timeLeft >= 0) {
            countdownDisplay.textContent = timeLeft;
        } else {
            clearInterval(timer);
            // Auto-fail behavior
            document.body.style.filter = 'brightness(0)';
            document.body.style.transition = 'filter 1.5s ease-in';
            setTimeout(() => location.reload(), 1500);
        }
    }, 1000);

    // YES Button - Re-initialize game
    document.getElementById('btn-yes').addEventListener('click', () => {
        clearInterval(timer);
        const main = document.querySelector('main');
        main.style.filter = 'brightness(5) saturate(2)';
        main.style.transition = 'filter 0.2s ease-out';
        setTimeout(() => location.reload(), 300);
    });

    // NO Button - Back to title
    document.getElementById('btn-no').addEventListener('click', () => {
        clearInterval(timer);
        document.body.style.filter = 'brightness(0) grayscale(1)';
        document.body.style.transition = 'filter 0.8s ease-out';
        setTimeout(() => location.reload(), 1000);
    });

    // Random Electrical Flicker
    setInterval(() => {
        if(Math.random() > 0.97) {
            document.body.style.backgroundColor = '#111';
            setTimeout(() => document.body.style.backgroundColor = '#000', 40);
        }
    }, 100);
</script>
</body></html>
