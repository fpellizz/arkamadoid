<script>
        const terminalLines = [
            "> SYSTEM INITIALIZING...",
            "> CHECKING BIOS INTEGRITY...",
            "> KERNEL LOADED: 0x88FF42",
            "> MOUNTING ASSETS...",
            "> LOADING SPRITE SHEETS...",
            "> COMPILING SHADERS...",
            "> SYNCING CRT REFRESH RATE...",
            "> INITIALIZING PHYSICS ENGINE...",
            "> GENERATING BRICK MESHES...",
            "> ALL SYSTEMS GREEN.",
            "> READY TO START."
        ];

        const terminalOutput = document.getElementById('terminal-output');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressStatus = document.getElementById('progress-status');

        let currentLine = 0;
        let progress = 0;

        function typeLine() {
            if (currentLine < terminalLines.length) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'glow-text-cyan';
                lineDiv.innerHTML = `<span class="opacity-50">#</span> ${terminalLines[currentLine]}<span class="cursor-blink ml-1">_</span>`;
                
                if (terminalOutput.lastChild) {
                    terminalOutput.lastChild.querySelector('.cursor-blink')?.remove();
                }

                terminalOutput.appendChild(lineDiv);
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
                currentLine++;

                const delay = Math.random() * 400 + 200;
                setTimeout(typeLine, delay);
            }
        }

        function updateProgress() {
            if (progress < 100) {
                progress += Math.random() * 5;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = `${progress}%`;
                progressPercent.innerText = `${Math.floor(progress)}%`;

                if (progress < 30) progressStatus.innerText = "Initializing Core...";
                else if (progress < 60) progressStatus.innerText = "Loading Assets...";
                else if (progress < 90) progressStatus.innerText = "Compiling Shaders...";
                else progressStatus.innerText = "Finalizing...";

                setTimeout(updateProgress, Math.random() * 300 + 50);
            } else {
                progressStatus.innerText = "SYSTEM READY";
                progressStatus.classList.add('animate-pulse');
            }
        }

        window.onload = () => {
            typeLine();
            updateProgress();
        };

        // Click interaction for arcade feel
        document.body.addEventListener('click', () => {
            const clickSound = new Audio(); // Placeholder for sound logic
            document.body.style.filter = 'brightness(1.5) contrast(1.2)';
            setTimeout(() => {
                document.body.style.filter = 'none';
            }, 50);
        });
    </script>
