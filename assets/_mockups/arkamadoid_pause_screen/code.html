<style>
        @keyframes scanline {

        @keyframes flicker {

            5% { opacity: 0.95; }

        .crt-overlay::after {

<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.arcade-button, .arcade-button-cyan');
            
            buttons.forEach(button => {
                button.addEventListener('mouseenter', () => {
                    // Slight vibration effect on hover
                    button.style.transform = 'translateY(-2px) scale(1.02)';
                });
                
                button.addEventListener('mouseleave', () => {
                    button.style.transform = 'translateY(0) scale(1)';
                });
            });

            // Spacebar/Esc to simulate "Resume" click
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' || e.key === ' ') {
                    const resumeBtn = document.querySelector('button:first-of-type');
                    resumeBtn.click();
                }
            });
        });
    </script>
