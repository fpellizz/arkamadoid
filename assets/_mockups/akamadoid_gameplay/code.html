<script>
        // Paddle movement script
        const paddle = document.getElementById('paddle');
        const container = document.getElementById('game-container');
        
        const movePaddle = (clientX) => {
            const rect = container.getBoundingClientRect();
            let x = clientX - rect.left;
            const halfWidth = paddle.offsetWidth / 2;
            if (x < halfWidth) x = halfWidth;
            if (x > rect.width - halfWidth) x = rect.width - halfWidth;
            paddle.style.left = `${x}px`;
        };

        container.addEventListener('mousemove', (e) => movePaddle(e.clientX));
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            movePaddle(e.touches[0].clientX);
        }, { passive: false });

        // Simple ball animation logic for demonstration
        let ballX = 48;
        let ballY = 40;
        let dx = 0.2;
        let dy = 0.35;

        function updateBall() {
            const ball = document.getElementById('ball');
            ballX += dx;
            ballY += dy;

            if (ballX <= 5 || ballX >= 95) dx *= -1;
            if (ballY <= 15) dy *= -1;
            
            // Paddle collision
            if (ballY >= 78 && ballY <= 82) {
                const paddleRect = paddle.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const ballRect = ball.getBoundingClientRect();
                const ballCenterX = ballRect.left + ballRect.width / 2;
                
                if (ballCenterX >= paddleRect.left && ballCenterX <= paddleRect.right) {
                    dy = -Math.abs(dy);
                }
            }

            if (ballY >= 95) {
                ballX = 48;
                ballY = 40;
            }

            ball.style.left = `${ballX}%`;
            ball.style.top = `${ballY}%`;
            requestAnimationFrame(updateBall);
        }
        updateBall();
    </script>
