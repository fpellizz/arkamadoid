name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name override (es. 0.2.0). Vuoto = usa quello di gradle.'
        required: false
        type: string
      version_code:
        description: 'Version code override (intero crescente). Vuoto = 1.'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android release APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write   # serve per creare GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret mancante"; exit 1
          fi
          echo "${KEYSTORE_BASE64}" | base64 -d > release-keystore.jks
          ls -la release-keystore.jks

      - name: Compute version from tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "VERSION_NAME=${TAG}" >> "$GITHUB_OUTPUT"
            echo "VERSION_CODE=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION_NAME=${{ inputs.version_name || '0.1.0' }}" >> "$GITHUB_OUTPUT"
            echo "VERSION_CODE=${{ inputs.version_code || '1' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK + AAB
        env:
          RELEASE_KEYSTORE_PATH: release-keystore.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: arkamadoid
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.ver.outputs.VERSION_CODE }}
        run: |
          ./gradlew :android:assembleRelease :android:bundleRelease \
            --no-daemon --stacktrace

      - name: Inspect output
        run: |
          ls -la android/build/outputs/apk/release/
          ls -la android/build/outputs/bundle/release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: arkamadoid-release-apk-${{ steps.ver.outputs.VERSION_NAME }}
          path: android/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: arkamadoid-release-aab-${{ steps.ver.outputs.VERSION_NAME }}
          path: android/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/build/outputs/apk/release/*.apk
            android/build/outputs/bundle/release/*.aab
          draft: false
          generate_release_notes: true
